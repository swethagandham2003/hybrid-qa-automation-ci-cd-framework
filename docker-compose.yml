services:

  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub

    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"

  chrome-node-1:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-1

    shm_size: 2gb

    depends_on:
      - selenium-hub

    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  chrome-node-2:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-2

    shm_size: 2gb

    depends_on:
      - selenium-hub

    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  chrome-node-3:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-3

    shm_size: 2gb

    depends_on:
      - selenium-hub

    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  automation-tests:
    build: .

    container_name: automation-tests

    depends_on:
      - selenium-hub
      - chrome-node-1
      - chrome-node-2
      - chrome-node-3

    volumes:
      - .:/app

    working_dir: /app

    command: pytest tests -v -n 3 --alluredir=allure-results